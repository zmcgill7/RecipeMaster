steps:
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zmcgill7-recipemaster/recipe-master:$COMMIT_SHA
      - .

  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zmcgill7-recipemaster/recipe-master:$COMMIT_SHA

  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - recipe-master
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zmcgill7-recipemaster/recipe-master:$COMMIT_SHA
      - --region=us-central1
      - --quiet

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zmcgill7-recipemaster/recipe-master:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
