<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'head.html' %}
</head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            $("#ingredient").on("input", function () {
                var query = $(this).val().toLowerCase();
                var uniqueIngredientNames = {{ uniqueIngredientNames| safe}};
                var suggestions = [];
                for (var i = 0; i < uniqueIngredientNames.length; i++) {
                    if (uniqueIngredientNames[i].toLowerCase().startsWith(query)) {
                        suggestions.push(uniqueIngredientNames[i]);
                        if (suggestions.length >= 50) {
                            break;
                        }
                    }
                }
                suggestions.sort(function (a, b) {
                    return a.length - b.length;
            });
            displaySuggestions(suggestions);
        });

        function displaySuggestions(suggestions) {
            var ul = $("ul.autocomplete");
            ul.empty();
            if (suggestions.length >= 15) {
                suggestions = suggestions.slice(0, 15);
            }
            for (var i = 0; i < suggestions.length; i++) {
                ul.append("<li>" + suggestions[i] + "</li>");
            }
        }

        $(document).on("click", "ul.autocomplete li", function () {
            var selectedText = $(this).text();
            $("#ingredient").val(selectedText);
            $("ul.autocomplete").empty();
        });
        });

</script>
<style>
    .pantry-wrapper {
        display: flex;
        row-gap: 30px;
        column-gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
        width: 80%;
        margin: 25px auto;
        padding: 25px;

        /*style text*/
        font-size: 15px;
        font-family: "marigny", "sans-serif";
        font-weight: 400;
        font-style: normal;
    }

    h1 {
        font-family: sauna-new, sans-serif;
        font-style: normal;
        font-weight: 900;
        font-size: 4em;
        margin-top: 0.4em;
    }

    .ingredient-container {
        background-color: #D7F9FF;
        border: 1px solid black;
        border-radius: 0.5em;
        padding:8px 14px;
        display: flex;
        align-items: center;
        column-gap: 5px;

    }

    .pantry-wrapper p {
        text-decoration: none;
        margin: 0;
    }

    .pantry-wrapper button {
        background:none;
        border: none;
        cursor:pointer;
    }

    .ingredient-container form {
        margin: 0;
    }

    .remove-btn {
        font-size: 12px;
    }
    ul.autocomplete {
        list-style-type: none;
        padding: 0;
    }
    ul.autocomplete li {
        cursor: pointer;
    }

    .error-message {
        color: red;
        margin: 10px 0;
        font-size: 16px;
        text-align: center;
    }
</style>
<body>
    {% include 'nav.html' %}

    <h1>Pantry</h1>

    <div class="add-ingredient-wrapper">
        <form id="ingredientForm" method="POST">
            {% csrf_token %}
            <div class="input-button-wrapper">
                <input class="input-box"type="text" name="ingredient" id="ingredient" placeholder="Enter ingredient..." value="{{ query }}">
                <button type="submit" name="addIngredient" class="btn">Add Ingredient</button>
            </div>
            <ul class="autocomplete ingredients"></ul>
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}
        </form>
    </div>

<!-- Placeholder text -->
    <section class="pantry-wrapper">
        {% for ingredient in ingredients %}
        <div class="ingredient-container">
            <form method="POST" action="{% url 'removePantryIngredient' %}">
                {% csrf_token %}
                <input type="hidden" name="ingredient" value="{{ ingredient }}">
                <button type="submit" class="remove-btn">&#10006;</button>
            </form>
            <p>{{ ingredient }}</p>
        </div>
        {% empty %}
        <p>No ingredients have been added yet.</p>
        {% endfor %}
    </section>

</body>
</html>
